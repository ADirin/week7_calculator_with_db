services:

  db:
    image: mariadb:11
    container_name: speedavg-db   # <-- changed name
    environment:
      MYSQL_ROOT_PASSWORD: Test12
      MYSQL_DATABASE: speed1_db
    ports:
      - "3305:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .
    container_name: speedavg-app
    depends_on:
      - db
    environment:
      DISPLAY: host.docker.internal:0.0

volumes:
  db_data: